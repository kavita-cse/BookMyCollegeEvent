<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.3);
        }

        .login-card h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
            text-align: center;
        }

        .login-card p.subtitle {
            font-size: 14px;
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #f43f5e;
            box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(244, 63, 94, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            display: none;
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 16px;
            border: 1px solid #fecaca;
        }

        .error-msg.show {
            display: block;
        }

        .lock-icon {
            text-align: center;
            margin-bottom: 20px;
        }

        .lock-icon i {
            font-size: 48px;
            color: #f43f5e;
        }

        @media (max-width: 480px) {
            .login-card {
                margin: 20px;
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="lock-icon"><i class='bx bxs-lock-alt'></i></div>
        <h1>Admin Access</h1>
        <p class="subtitle">Enter your credentials to continue</p>

        <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="off" required placeholder="Enter admin email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="off" required placeholder="Enter password">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
        </form>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://cbqbqncbjxfwrhhgxmjk.supabase.co';
        const supabaseKey = 'sb_publishable_XEBmcn5vcJGWBDO3GH9GRw_f55J9d9_';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        // If already logged in, skip to panel
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) window.location.href = 'index.html';
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            document.getElementById('errorMsg').classList.remove('show');

            const { error } = await sb.auth.signInWithPassword({ email, password: pass });

            if (error) {
                document.getElementById('errorMsg').textContent = 'Invalid credentials. Please try again.';
                document.getElementById('errorMsg').classList.add('show');
                document.getElementById('password').value = '';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
