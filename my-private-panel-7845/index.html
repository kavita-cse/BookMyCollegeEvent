<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | BookMyCollegeEvent</title>
    <link rel="stylesheet" href="admin.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin<span>Panel</span></h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-target="addEventSection">
                    <i class='bx bx-plus-circle'></i> Add Event
                </button>
                <button class="nav-btn" data-target="manageEventsSection">
                    <i class='bx bx-list-ul'></i> Manage Events
                </button>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="back-link"><i class='bx bx-arrow-back'></i> Back to Site</a>
                <button id="logoutBtn" class="back-link" style="background: none; border: none; cursor: pointer; color: inherit; font: inherit; display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 0; margin-top: 8px; color: #f43f5e;">
                    <i class='bx bx-log-out'></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-panel">
            <!-- Add Event Section -->
            <section id="addEventSection" class="admin-section active">
                <div class="section-header">
                    <h2>Add New Event</h2>
                </div>
                <div class="form-container">
                    <form id="addEventForm" class="modern-form">
                        <div class="form-group">
                            <label for="title">Event Title <span class="required">*</span></label>
                            <input type="text" id="title" name="title" required minlength="3" placeholder="Enter event title">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="college_name">College Name <span class="required">*</span></label>
                                <input type="text" id="college_name" name="college_name" required placeholder="Enter college name">
                            </div>
                            <div class="form-group">
                                <label for="category">Category <span class="required">*</span></label>
                                <input type="text" id="category" name="category-field" list="category_list" required placeholder="Choose or type category" autocomplete="off">
                                <datalist id="category_list">
                                    <option value="Hackathons"></option>
                                    <option value="Sports"></option>
                                    <option value="Fests"></option>
                                    <option value="Workshops"></option>
                                    <option value="Others"></option>
                                </datalist>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="venue">Venue <span class="required">*</span></label>
                            <input type="text" id="venue" name="venue" required placeholder="Event venue">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="date_time">Start Date & Time <span class="required">*</span></label>
                                <input type="datetime-local" id="date_time" name="date_time" required>
                            </div>
                            <div class="form-group">
                                <label for="end_date_time">End Date & Time <span class="required">*</span></label>
                                <input type="datetime-local" id="end_date_time" name="end_date_time" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="description">Description <span class="required">*</span></label>
                            <textarea id="description" name="description" rows="4" required placeholder="Event description"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="keywords">Keywords <span class="optional">(optional)</span></label>
                            <input type="text" id="keywords" name="keywords" placeholder="e.g. tech, competition, campus">
                        </div>
                        <div class="form-group">
                            <label for="event_link">Event Registration Link <span class="optional">(optional)</span></label>
                            <input type="url" id="event_link" name="event_link" placeholder="https://example.com/register">
                        </div>
                        <div class="form-group" style="border: 2px dashed var(--primary-light, #fda4af); border-radius: 12px; padding: 20px; background: #fff5f7;">
                            <label for="image" style="font-size: 15px; font-weight: 700; color: var(--primary);">
                                <i class='bx bx-images' style="margin-right: 4px;"></i> Event Gallery Images <span class="required">*</span>
                            </label>
                            <p style="font-size: 12px; color: #64748b; margin: 4px 0 10px;">Select multiple images to create a scrollable gallery on the event card. (Max 10MB each)</p>
                            <input type="file" id="image" name="image" accept="image/*" multiple required>
                        </div>
                        <button type="submit" class="submit-btn" id="submitAddEventBtn">
                            <span class="btn-text">Add Event</span>
                            <div class="spinner hidden" id="addEventSpinner"></div>
                        </button>
                        <div id="addEventMessage" class="message"></div>
                    </form>
                </div>
            </section>

            <!-- Manage Events Section -->
            <section id="manageEventsSection" class="admin-section">
                <div class="section-header">
                    <h2>Manage Events</h2>
                    <button id="refreshEventsBtn" class="refresh-btn" title="Refresh"><i class='bx bx-refresh'></i></button>
                </div>
                <div id="manageEventsState">
                    <!-- Loading, Error or Empty state -->
                    <div class="spinner" id="manageLoader" style="margin: 40px auto; width: 40px; height: 40px; border-width: 4px; border-top-color: var(--primary);"></div>
                </div>
                <div class="events-list" id="eventsList">
                    <!-- Event items rendered here via JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Event Modal -->
    <div id="editEventModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeEditModal">&times;</span>
            <div class="section-header">
                <h2>Edit Event</h2>
            </div>
            <form id="editEventForm" class="modern-form">
                <input type="hidden" id="edit_id" name="id">
                <div class="form-group">
                    <label for="edit_title">Event Title <span class="required">*</span></label>
                    <input type="text" id="edit_title" name="title" required minlength="3">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit_college_name">College Name <span class="required">*</span></label>
                        <input type="text" id="edit_college_name" name="college_name" required>
                    </div>
                    <div class="form-group">
                        <label for="edit_category">Category <span class="required">*</span></label>
                        <input type="text" id="edit_category" name="category-field" list="edit_category_list" required autocomplete="off">
                        <datalist id="edit_category_list">
                            <option value="Hackathons"></option>
                            <option value="Sports"></option>
                            <option value="Fests"></option>
                            <option value="Workshops"></option>
                            <option value="Others"></option>
                        </datalist>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit_venue">Venue <span class="required">*</span></label>
                    <input type="text" id="edit_venue" name="venue" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit_date_time">Start Date & Time <span class="required">*</span></label>
                        <!-- Note: Value must be formatted to ISO without timezone for datetime-local -->
                        <input type="datetime-local" id="edit_date_time" name="date_time" required>
                    </div>
                    <div class="form-group">
                        <label for="edit_end_date_time">End Date & Time <span class="required">*</span></label>
                        <input type="datetime-local" id="edit_end_date_time" name="end_date_time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit_description">Description <span class="required">*</span></label>
                    <textarea id="edit_description" name="description" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="edit_keywords">Keywords <span class="optional">(optional)</span></label>
                    <input type="text" id="edit_keywords" name="keywords" placeholder="e.g. tech, competition, campus">
                </div>
                <div class="form-group">
                    <label for="edit_event_link">Event Registration Link <span class="optional">(optional)</span></label>
                    <input type="url" id="edit_event_link" name="event_link" placeholder="https://example.com/register">
                </div>
                <div class="form-group" style="border: 2px dashed var(--primary-light, #fda4af); border-radius: 12px; padding: 20px; background: #fff5f7;">
                    <label for="edit_image" style="font-size: 15px; font-weight: 700; color: var(--primary);">
                        <i class='bx bx-images' style="margin-right: 4px;"></i> Event Gallery Images
                    </label>
                    <p style="font-size: 12px; color: #64748b; margin: 4px 0 10px;">Leave empty to keep current images. Select new images to replace the gallery.</p>
                    <!-- Shows small preview of current image -->
                    <div class="current-image-preview">
                        <img id="edit_current_image" src="" alt="Current Event Image">
                    </div>
                    <input type="file" id="edit_image" name="image" accept="image/*" multiple>
                </div>
                <button type="submit" class="submit-btn" id="submitEditEventBtn">
                    <span class="btn-text">Save Changes</span>
                    <div class="spinner hidden" id="editEventSpinner"></div>
                </button>
                <div id="editEventMessage" class="message"></div>
            </form>
        </div>
    </div>

    <!-- Supabase SDK & App Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
